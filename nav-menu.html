
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="../output.css">
    <title>Document</title>
</head>
<body>
  
     <div class="relative inline-block group">

    <!-- دکمه دسته‌بندی -->
    <div class="flex items-center gap-2 cursor-pointer  text-black px-4 py-3 rounded">
        <svg xmlns="http://www.w3.org/2000/svg"
             fill="currentColor"
             class="w-7 h-7"
             viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                  d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>

        <p class="text-black">دسته بندی کالاها</p>
    </div>

    <!-- منو -->
    <div class="absolute left-0 top-full  hidden group-hover:flex
                w-[700px] bg-white shadow-xl border rounded-lg z-50">

        <!-- منوی اصلی -->
        <div class="w-52  bg-gray-50">
            <ul>
                <li class=" px-4 py-3 hover:bg-gray-400 cursor-pointer ">
                    موبایل
                </li>

                <li class=" px-4 py-3 hover:bg-gray-400 cursor-pointer">
                    لپ‌تاپ
                </li>

                <li class=" px-4 py-3 hover:bg-gray-400 cursor-pointer">
                    لوازم جانبی
                </li>

                <li class=" px-4 py-3 hover:bg-gray-400 cursor-pointer">
                    تلویزیون
                </li>

                <li class=" px-4 py-3 hover:bg-gray-400 cursor-pointer">
                    بازی و کنسول
                </li>
            </ul>
        </div>

        <!-- زیرمنو -->
        <div class="flex-1 p-6">
            <h3 class="font-bold text-lg mb-4">
                دسته موبایل
            </h3>

            <div class="grid grid-cols-5 gap-6">
                <div>
                    <h4 class="font-semibold text-red-500 mb-2">
                        برندها
                    </h4>
                    <ul class="space-y-2 text-gray-600">
                        <li>سامسونگ</li>
                        <li>اپل</li>
                        <li>شیائومی</li>
                        <li>پوکو</li>
                    </ul>
                </div>

                <div>
                    <h4 class="font-semibold text-red-500 mb-2">
                        لوازم جانبی
                    </h4>
                    <ul class="space-y-2 text-gray-600">
                        <li>شارژر</li>
                        <li>هندزفری</li>
                        <li>قاب گوشی</li>
                    </ul>
                </div>

                <div>
                    <h4 class="font-semibold text-red-500 mb-2">
                        محصولات ویژه
                    </h4>
                    <ul class="space-y-2 text-gray-600">
                        <li>گوشی پرچمدار</li>
                        <li>گوشی اقتصادی</li>
                        <li>گوشی گیمینگ</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

</div>



    
</body>
</html>
